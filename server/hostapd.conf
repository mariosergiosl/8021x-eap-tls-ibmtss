# ======================================================================================
# FILE: /etc/hostapd/hostapd.conf
# USAGE: hostapd -ddKt /etc/hostapd/hostapd.conf
# DESCRIPTION: Configuration file for hostapd acting as 802.1X Authenticator and 
#              local EAP-TLS Server (No RADIUS). Used for wired interfaces.
# OPTIONS: Adjust 'interface', 'ca_cert', 'server_cert' and 'private_key' parameters.
# AUTHOR: Mario Luz
# VERSION: 1.0
# ======================================================================================

# --------------------------------------------------------------------------------------
# Interface and Driver Configuration
# --------------------------------------------------------------------------------------
# Replace 'eth1' with the exact name of the interface connected to the TAA VM.
interface=eth3
driver=wired

# --------------------------------------------------------------------------------------
# IEEE 802.1X Settings
# --------------------------------------------------------------------------------------
# Enable 802.1X authorization on the port
ieee8021x=1
# EAPOL version (2 is standard for modern implementations)
eapol_version=2

# --------------------------------------------------------------------------------------
# Integrated EAP Server Settings (No FreeRADIUS)
# --------------------------------------------------------------------------------------
# Enable internal EAP server
eap_server=1
# Path to the EAP user database file
eap_user_file=/etc/hostapd/hostapd.eap_user

# --------------------------------------------------------------------------------------
# EAP-TLS Certificate Configuration
# --------------------------------------------------------------------------------------
# Absolute paths to the PKI files. Adjust these to match your generated certificates.
ca_cert=/etc/ssl/certs/ca-lab.crt
server_cert=/etc/ssl/certs/server.crt
private_key=/etc/ssl/private/server.key

# Disable Certificate Revocation List (CRL) checking for lab environments
check_crl=0

# EAP fragment size to prevent MTU issues with large RSA certificates
fragment_size=1024
